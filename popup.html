<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    header {
      background: #0046ff;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }
    .add-form {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 11px; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .field-pattern { flex: 1; }
    input, select {
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: white;
    }
    input:focus, select:focus { border-color: #0046ff; box-shadow: 0 0 0 2px rgba(0,70,255,0.1); }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      transition: background 0.15s;
    }
    .btn-add {
      background: #0046ff;
      color: white;
      white-space: nowrap;
    }
    .btn-add:hover { background: #0035cc; }
    .rules-list {
      max-height: 350px;
      overflow-y: auto;
    }
    .rule {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
    }
    .rule:hover { background: #fafbfc; }
    .rule-toggle { flex-shrink: 0; }
    .rule-info { flex: 1; min-width: 0; }
    .rule-pattern {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      word-break: break-all;
    }
    .rule-status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .status-4xx { background: #fef3c7; color: #92400e; }
    .status-5xx { background: #fee2e2; color: #991b1b; }
    .btn-delete {
      background: none;
      color: #9ca3af;
      padding: 4px;
      font-size: 16px;
      line-height: 1;
    }
    .btn-delete:hover { color: #ef4444; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #0046ff; }
    .toggle input:checked + .slider::after { transform: translateX(16px); }
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #9ca3af;
    }
    .empty p:first-child { font-size: 24px; margin-bottom: 8px; }
    .hint {
      padding: 8px 16px;
      font-size: 11px;
      color: #9ca3af;
      background: #f8f9fa;
      border-top: 1px solid #e5e7eb;
    }
    .hint code {
      background: #e5e7eb;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .actions {
      padding: 8px 16px;
      background: #f8f9fa;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
    }
    .btn-clear {
      background: none;
      color: #ef4444;
      font-size: 12px;
      padding: 4px 8px;
    }
    .btn-clear:hover { background: #fef2f2; }
    .btn-export {
      background: none;
      color: #6b7280;
      font-size: 12px;
      padding: 4px 8px;
    }
    .btn-export:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <header>
    <h1>Endpoint Rejector</h1>
    <span class="badge" id="count">0 rules</span>
  </header>

  <div class="add-form">
    <div class="field field-pattern">
      <label>URL Pattern</label>
      <input type="text" id="pattern" placeholder="/api/2/accounts*" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="statusCode">
        <option value="400">400</option>
        <option value="401">401</option>
        <option value="403">403</option>
        <option value="404">404</option>
        <option value="408">408</option>
        <option value="409">409</option>
        <option value="429">429</option>
        <option value="500" selected>500</option>
        <option value="502">502</option>
        <option value="503">503</option>
        <option value="504">504</option>
      </select>
    </div>
    <button class="btn-add" id="addBtn">Add</button>
  </div>

  <div class="rules-list" id="rulesList"></div>

  <div class="hint">
    Patterns use substring match. Use <code>*</code> as wildcard. Reload the page after changes.
  </div>

  <div class="actions">
    <button class="btn-export" id="exportBtn">Copy rules</button>
    <button class="btn-clear" id="clearBtn">Clear all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
